<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="workspace">
      <header class="topbar">
        <div class="topbar-start">
          <button id="toggle-left-sidebar" type="button" class="icon-btn" title="Toggle file explorer (Cmd+B)">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 4.5h12M3 9h12M3 13.5h12"/></svg>
          </button>
          <div class="brand">
            <span class="brand-mark">A</span>
            <span class="brand-name">{{ app_name }}</span>
          </div>
        </div>

        <div class="search-wrap">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="7.5" cy="7.5" r="5.5"/><path d="M12 12l4 4"/></svg>
          <input id="search-input" type="search" placeholder="Search notes..." />
          <kbd class="search-kbd">&#8984;K</kbd>
          <div id="search-results" class="search-dropdown hidden"></div>
        </div>

        <div class="topbar-end">
          <button id="new-note-button" type="button" class="icon-btn" title="New note">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
          </button>
          <div class="auth-group">
            <span id="account-status" class="auth-pill">Checking&hellip;</span>
            <button id="login-button" type="button" class="text-btn">Login</button>
            <button id="logout-button" type="button" class="text-btn hidden">Logout</button>
          </div>
          <button id="toggle-right-sidebar-button" type="button" class="icon-btn" title="Toggle agent panel">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="2" y="2" width="14" height="14" rx="2"/><path d="M11 2v14"/></svg>
          </button>
        </div>
      </header>

      <div class="app-body">
        <aside id="left-sidebar" class="sidebar-left">
          <div class="sidebar-head">
            <h2 class="vault-name">{{ vault_name }}</h2>
            <button id="explorer-toggle-button" type="button" class="icon-btn-sm" title="New note">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
            </button>
          </div>

          <form id="new-note-form" class="new-note-form hidden">
            <input id="new-note-name" type="text" placeholder="Note name" />
            <input id="new-note-parent" type="text" placeholder="Folder" />
            <div class="form-row">
              <button type="submit" class="btn-primary btn-sm">Create</button>
              <button id="cancel-new-note-button" type="button" class="btn-ghost btn-sm">Cancel</button>
            </div>
          </form>

          <nav id="tree-root" class="file-tree"></nav>
        </aside>

        <main class="editor-main">
          <div class="editor-tab-bar">
            <div id="note-tabs" class="tab-list"></div>
            <div class="view-controls">
              <div class="view-switcher">
                <button id="view-edit-button" type="button" class="view-btn">Edit</button>
                <button id="view-preview-button" type="button" class="view-btn">Preview</button>
                <button id="view-split-button" type="button" class="view-btn">Split</button>
              </div>
            </div>
          </div>

          <section class="doc-surface">
            <div class="doc-header">
              <div class="doc-header-text">
                <p id="document-path" class="doc-path">Choose a note from the vault.</p>
                <h1 id="document-title" class="doc-title">Welcome</h1>
              </div>
              <div class="doc-actions">
                <button id="run-on-note-button" type="button" class="btn-ghost btn-sm" title="Run ambient agent on this note">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 13,8 5,13"/></svg>
                  Run
                </button>
                <span id="document-state" class="state-pill muted">Idle</span>
                <button id="save-button" type="button" class="btn-primary btn-sm">Save</button>
              </div>
            </div>

            <div id="document-content" class="doc-content doc-content-split">
              <textarea id="editor-textarea" spellcheck="false" placeholder="Select a note to start writing."></textarea>
              <div id="preview-pane" class="preview-pane"></div>
            </div>
          </section>
        </main>

        <aside id="right-sidebar" class="sidebar-right">
          <div class="sidebar-scroll">

            <!-- Agent selector -->
            <div class="panel-section agent-selector-section">
              <div class="section-head">
                <span class="section-label">Agents</span>
                <button id="new-agent-button" type="button" class="icon-btn-sm" title="New agent">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
                </button>
              </div>
              <div id="agent-picker" class="agent-picker"></div>
            </div>

            <!-- Selected agent header + quick run -->
            <div id="agent-context" class="panel-section agent-context">
              <div class="agent-context-head">
                <div class="agent-context-info">
                  <h3 id="agent-form-title" class="agent-context-name">No agent selected</h3>
                  <p id="agent-form-subtitle" class="agent-context-meta">Create an agent to get started.</p>
                </div>
                <span id="agent-status-indicator" class="agent-status-dot"></span>
              </div>

              <form id="quick-run-form" class="quick-run-form">
                <textarea id="quick-run-prompt" rows="2" placeholder="Ask this agent to do something..."></textarea>
                <button id="quick-run-button" type="submit" class="btn-primary btn-sm" disabled>Run</button>
              </form>
            </div>

            <!-- Runs -->
            <div class="panel-section">
              <div class="section-head">
                <span class="section-label">Runs</span>
              </div>
              <div id="run-list" class="run-list"></div>
              <div id="run-detail" class="run-detail empty-state">Select a run to see details.</div>
            </div>

            <!-- Jobs -->
            <div class="panel-section">
              <div class="section-head">
                <span class="section-label">Jobs</span>
                <button id="new-job-button" type="button" class="icon-btn-sm" title="New job">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
                </button>
              </div>
              <div id="job-list" class="job-list"></div>
              <details id="job-config-details" class="config-details">
                <summary>New job</summary>
                <form id="job-form" class="config-form">
                  <input id="job-id" type="hidden" />
                  <label>
                    <span>Name</span>
                    <input id="job-name" type="text" placeholder="Daily scan" required />
                  </label>
                  <label>
                    <span>Prompt</span>
                    <textarea id="job-prompt" rows="3" placeholder="What should happen each run." required></textarea>
                  </label>
                  <div class="form-grid-2">
                    <label>
                      <span>Schedule</span>
                      <select id="job-schedule-type">
                        <option value="interval">Heartbeat</option>
                        <option value="manual">Manual</option>
                      </select>
                    </label>
                    <label>
                      <span>Interval (min)</span>
                      <input id="job-interval-minutes" type="number" min="1" step="1" value="60" />
                    </label>
                  </div>
                  <label class="checkbox-label">
                    <input id="job-enabled" type="checkbox" checked />
                    <span>Enabled</span>
                  </label>
                  <div class="form-row">
                    <button type="submit" class="btn-primary btn-sm">Save job</button>
                  </div>
                </form>
              </details>
            </div>

            <!-- Agent config (collapsible) -->
            <div class="panel-section">
              <details id="agent-config-details" class="config-details">
                <summary>Agent settings</summary>
                <form id="agent-form" class="config-form">
                  <input id="agent-id" type="hidden" />
                  <label>
                    <span>Name</span>
                    <input id="agent-name" type="text" placeholder="Research Copilot" required />
                  </label>
                  <label>
                    <span>Scope</span>
                    <input id="agent-scope-path" type="text" placeholder="Research" />
                  </label>
                  <label>
                    <span>Output dir</span>
                    <input id="agent-output-dir" type="text" placeholder="Research/Inbox" />
                  </label>
                  <label>
                    <span>Prompt</span>
                    <textarea id="agent-prompt" rows="4" placeholder="Describe the agent's role." required></textarea>
                  </label>
                  <div class="form-grid-2">
                    <label>
                      <span>Model</span>
                      <input id="agent-model" type="text" />
                    </label>
                    <label>
                      <span>Effort</span>
                      <select id="agent-effort"></select>
                    </label>
                    <label>
                      <span>Approval</span>
                      <select id="agent-approval"></select>
                    </label>
                    <label>
                      <span>Sandbox</span>
                      <select id="agent-sandbox"></select>
                    </label>
                  </div>
                  <label class="checkbox-label">
                    <input id="agent-enabled" type="checkbox" checked />
                    <span>Enabled</span>
                  </label>
                  <div class="form-row">
                    <button type="submit" class="btn-primary btn-sm">Save</button>
                    <button id="reset-agent-button" type="button" class="btn-ghost btn-sm">Reset</button>
                  </div>
                </form>
              </details>
            </div>

          </div>
        </aside>
      </div>

      <footer class="statusbar">
        <div class="status-left">
          <span id="status-note-path">No note</span>
          <span class="status-sep">&middot;</span>
          <span id="status-word-count">0 words</span>
          <span class="status-sep">&middot;</span>
          <span id="status-save-state">Idle</span>
        </div>
        <div class="status-right">
          <span id="status-agent-state">No agent</span>
          <span class="status-sep">&middot;</span>
          <span id="status-next-run">No heartbeat</span>
        </div>
      </footer>
    </div>

    <!-- Hidden elements for JS compatibility -->
    <span id="document-breadcrumbs" class="hidden"></span>
    <span id="current-agent-chip" class="hidden"></span>
    <div id="agent-glance-list" class="hidden"></div>
    <div id="agent-list" class="hidden"></div>

    <div id="toast" class="toast hidden"></div>
    <script src="/static/app.js" defer></script>
  </body>
</html>
